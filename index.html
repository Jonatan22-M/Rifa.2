<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Rifa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Aquí todos pueden ganar ❤️</h1>

    <div class="Card">

            <h2>🎟️ Registro de Rifa</h2>

            <div class="form-container">
                <input type="text" id="fullName" placeholder="Nombre Completo" inputmode="text">
                <div class="form-row">
                    <input class="tel" id="phone" placeholder="Teléfono (10 Dígitos)" maxlength="10" inputmode="numeric">
                    <input type="number" id="selectedNum" placeholder="N°" readonly>
                </div>
            </div>
            <p class="label">Selecciona un Número Disponible</p>
            <div class="number-grid" id="grid"></div> 
            <button class="btn btn-primary" id="btnRegister">Comfirmar Registro</button>
    </div>

    <div class="card winner-card">
        <button class="btn btn-secondary" id="btnSortear">✨ Realizar Sorteo</button>
        <div class="winner-box" id="winnerBox">
            <p>¡El Afortunado es!</p>
            <h3 id="winnerName">---</h3>
            <p id="winnerDetails"></p>
        </div>

        <button class="btn btn-danger" id="btnReset">Reiniciar Rifa</button>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
